name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changed files
        run: npm run lint:ci
        env:
          LINT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          LINT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-placeholder

      - name: Check bundle budgets
        run: npm run perf:bundle

      - name: Upload performance report
        if: ${{ hashFiles('output/performance/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: output/performance/
          if-no-files-found: ignore
